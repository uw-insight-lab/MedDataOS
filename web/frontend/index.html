<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDataOS - Medical Data Operating System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚕</span>
                    <div class="logo-text">
                        <h1>MedDataOS</h1>
                        <p class="subtitle">Medical Data Operating System</p>
                    </div>
                </div>
                <div class="connection-indicator">
                    <span id="connection-status" class="status disconnected"></span>
                    <span id="connection-text">Disconnected</span>
                </div>
            </div>
        </header>

        <main>
            <div class="query-panel">
                <div class="panel-header">
                    <h2>Task Input</h2>
                </div>
                <div class="query-input-container">
                    <textarea
                        id="query-input"
                        placeholder="Enter your medical data analysis task (e.g., 'Analyze chest X-ray from URL: https://example.com/xray.jpg' or 'Prepare and analyze patient dataset for survival prediction')"
                        rows="3"
                    ></textarea>
                    <button id="execute-btn" class="btn-execute">
                        <span class="btn-text">Execute Analysis</span>
                    </button>
                </div>
            </div>

            <div class="execution-panel">
                <div class="panel-header">
                    <h2>Execution Log</h2>
                    <button id="clear-btn" class="btn-clear">Clear</button>
                </div>
                <div class="logs-container" id="logs-container">
                    <!-- Logs will be added here dynamically -->
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
