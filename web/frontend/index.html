<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDataOS - Medical Data Operating System</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚕</span>
                    <div class="logo-text">
                        <h1>MedDataOS</h1>
                        <p class="subtitle">Medical Data Operating System</p>
                    </div>
                </div>
                <div class="connection-indicator">
                    <span id="connection-status" class="status disconnected"></span>
                    <span id="connection-text">Disconnected</span>
                </div>
            </div>
        </header>

        <main>
            <div class="chat-panel">
                <div class="panel-header">
                    <h2>Chat</h2>
                    <button id="clear-btn" class="btn-clear">Clear</button>
                </div>

                <div class="chat-container" id="chat-container">
                    <!-- Chat messages will be added here dynamically -->
                </div>

                <div class="chat-input-container">
                    <textarea
                        id="message-input"
                        placeholder="Ask me to analyze medical data, prepare datasets, or generate reports..."
                        rows="2"
                    ></textarea>
                    <button id="send-btn" class="btn-send" disabled>
                        <span class="btn-text">Send</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js?v=2"></script>
</body>
</html>
