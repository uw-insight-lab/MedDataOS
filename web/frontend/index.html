<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDataOS - Medical Data Operating System</title>
    <link rel="stylesheet" href="/static/style.css?v=24">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <button id="sidebar-toggle" class="btn-sidebar-toggle" title="Toggle sidebar">
                        <span class="toggle-icon">☰</span>
                    </button>
                    <div class="logo">
                        <span class="logo-icon">⚕</span>
                        <div class="logo-text">
                            <h1>MedDataOS</h1>
                            <p class="subtitle">Medical Data Operating System</p>
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <div class="connection-indicator">
                        <span id="connection-status" class="status disconnected"></span>
                        <span id="connection-text">Disconnected</span>
                    </div>
                    <button id="insights-toggle" class="btn-insights-toggle" title="Toggle insights panel">
                        <span class="toggle-icon">&#x1F4CC;</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="app-body">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Patients</span>
                </div>
                <div class="sidebar-content" id="sidebar-content">
                    <!-- Patient list rendered by JS -->
                </div>
            </aside>

            <main>
                <div class="chat-panel">
                    <div class="panel-header">
                        <h2>Chat <span id="active-patient-label" class="active-patient-label"></span></h2>
                        <div class="panel-header-actions">
                            <button id="clear-btn" class="btn-clear">Clear</button>
                        </div>
                    </div>

                    <div class="chat-container" id="chat-container">
                        <!-- Chat messages will be added here dynamically -->
                    </div>

                    <div class="chat-input-container">
                        <div class="input-wrapper">
                            <div class="file-attachment" id="file-attachment" style="display: none;">
                                <span class="file-name" id="file-name"></span>
                                <button class="file-remove" id="file-remove" title="Remove file">×</button>
                            </div>
                            <div class="input-row">
                                <input type="file" id="file-input" accept=".csv,.xlsx" style="display: none;">
                                <button id="attach-btn" class="btn-attach" title="Attach CSV or Excel file">
                                    <span class="btn-icon">📎</span>
                                </button>
                                <textarea
                                    id="message-input"
                                    placeholder="Ask about this patient..."
                                    rows="2"
                                ></textarea>
                                <button id="send-btn" class="btn-send" disabled>
                                    <span class="btn-text">Send</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="insights-panel collapsed" id="insights-panel">
                <div class="insights-header">
                    <span class="insights-title">Pinned</span>
                </div>
                <div class="insights-content" id="insights-content">
                    <!-- Pinned citation cards rendered by JS -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Citation hover card (content built dynamically) -->
    <div id="citation-popup"></div>

    <!-- Citation detail modal -->
    <div id="citation-backdrop" class="citation-backdrop"></div>
    <div id="citation-modal" class="citation-modal">
        <div class="modal-header">
            <div class="modal-agent-group">
                <span class="modal-agent" id="modal-agent"></span>
                <button class="btn-agent-info" id="modal-info-btn" title="About this agent">ⓘ</button>
                <div class="agent-info-tooltip" id="modal-agent-info"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-pin" id="modal-pin" title="Pin citation">&#x1F4CC;</button>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-summary" id="modal-summary"></div>
        <div class="modal-provenance" id="modal-provenance"></div>
        <div class="modal-annotations" id="modal-annotations">
            <div class="annotation-tags" id="modal-annotation-tags"></div>
            <textarea id="modal-annotation-text" placeholder="Add clinical notes..." rows="2"></textarea>
        </div>
    </div>

    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <script src="/static/app.js?v=24"></script>
</body>
</html>
